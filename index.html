<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五龍命式学 〜高精度・天文暦準拠API連携システム〜</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #AA7C11;
            --deep-bg: #0d131a;
            --card-bg: rgba(22, 34, 49, 0.85);
            --text-light: #f0f4f8;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { background: #05090e; background-image: radial-gradient(circle at 50% 30%, #112235 0%, #05090e 80%); color: var(--text-light); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .app-container { width: 100%; max-width: 480px; background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); overflow: hidden; backdrop-filter: blur(10px); }
        .header { background: linear-gradient(135deg, #0a1118 0%, #162638 100%); padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--gold); position: relative; }
        .header h1 { font-size: 20px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .header p { font-size: 11px; color: var(--text-dim); margin-top: 5px; font-weight: bold; letter-spacing: 1px; }
        .content { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; background: rgba(10, 18, 28, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s; }
        input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(212,175,55,0.3); }
        .gender-selector { display: flex; gap: 10px; margin-bottom: 22px; }
        .gender-btn { flex: 1; padding: 12px; background: rgba(10, 18, 28, 0.6); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; text-align: center; }
        .gender-btn.active { background: linear-gradient(135deg, var(--dark-gold), var(--gold)); color: #000; border-color: var(--gold); box-shadow: 0 4px 12px rgba(212,175,55,0.2); }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #bd942a, #ebd07b); border: none; border-radius: 8px; color: #101924; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: transform 0.1s, opacity 0.2s; letter-spacing: 1px; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn.loading { opacity: 0.5; cursor: wait; }
        .result-title { font-size: 13px; color: #fff; text-align: center; margin-bottom: 15px; padding: 6px; background: rgba(212,175,55,0.15); border-radius: 4px; border-left: 3px solid var(--gold); }
        
        /* 五龍降臨エリアの追加 */
        .dragon-manifest-area { text-align: center; margin-bottom: 20px; }
        .dragon-visual { width: 200px; height: 200px; margin: 0 auto; display: none; /* 初期は非表示 */ background-size: cover; background-position: center; border-radius: 50%; border: 4px solid rgba(212, 175, 55, 0.3); box-shadow: 0 0 20px rgba(212,175,55,0.5); animation: dragonFadeIn 1.5s ease-out; }
        @keyframes dragonFadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .dragon-name { font-size: 18px; font-weight: bold; color: #fff; margin-top: 10px; min-height: 27px; }
        .gogyo-affinity { font-size: 12px; color: var(--gold); }

        .meishiki-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
        .meishiki-card { background: rgba(10, 17, 26, 0.9); border: 1px solid rgba(212,175,55,0.15); border-radius: 8px; text-align: center; padding: 8px 4px; position: relative; }
        .card-label { font-size: 10px; color: var(--gold); margin-bottom: 6px; font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 3px; }
        .kan { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 2px; }
        .chi { font-size: 18px; font-weight: bold; color: #e2e8f0; margin-bottom: 6px; }
        .star { font-size: 11px; color: #ebd07b; font-weight: bold; background: rgba(212, 175, 55, 0.1); padding: 3px 0; border-radius: 4px; margin-top: 4px; display: block; min-height: 22px; }
        
        .diagnostic-box { background: rgba(212, 175, 55, 0.04); border: 1px dashed rgba(212, 175, 55, 0.2); border-radius: 10px; padding: 15px; font-size: 13px; line-height: 1.6; color: #e2e8f0; margin-bottom: 20px; }
        .line-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #06C755, #05b04b); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(6,199,85,0.3); margin-bottom: 12px; }
        .back-btn { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--text-dim); font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: center; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>五龍命式学</h1>
        <p>〜高精度・天文暦準拠API連携システム〜</p>
    </div>

    <div class="content" id="input-view">
        <div class="form-group">
            <label>御名前（ニックネーム可）</label>
            <input type="text" id="username" placeholder="例：龍月">
        </div>
        <div class="form-group">
            <label>性別</label>
            <div class="gender-selector">
                <div class="gender-btn active" id="btn-male" onclick="setGender('male')">男性命</div>
                <div class="gender-btn" id="btn-female" onclick="setGender('female')">女性命</div>
            </div>
        </div>
        <div class="form-group">
            <label>生年月日</label>
            <input type="date" id="birthday" value="1964-05-19">
        </div>
        <div class="form-group">
            <label>出生時刻</label>
            <select id="birthtime">
                <option value="-1">不明</option>
                <option value="0">0:00 〜 0:59</option><option value="1">1:00 〜 1:59</option>
                <option value="2">2:00 〜 2:59</option><option value="3">3:00 〜 3:59</option>
                <option value="4">4:00 〜 4:59</option><option value="5">5:00 〜 5:59</option>
                <option value="6">6:00 〜 6:59</option><option value="7">7:00 〜 7:59</option>
                <option value="8">8:00 〜 8:59</option><option value="9">9:00 〜 9:59</option>
                <option value="10">10:00 〜 10:59</option><option value="11">11:00 〜 11:59</option>
                <option value="12">12:00 〜 12:59</option><option value="13">13:00 〜 13:59</option>
                <option value="14">14:00 〜 14:59</option><option value="15">15:00 〜 15:59</option>
                <option value="16">16:00 〜 16:59</option><option value="17">17:00 〜 17:59</option>
                <option value="18">18:00 〜 18:59</option><option value="19">19:00 〜 19:59</option>
                <option value="20" selected>20:00 〜 20:59</option><option value="21">21:00 〜 21:59</option>
                <option value="22">22:00 〜 22:59</option><option value="23">23:00 〜 23:59</option>
            </select>
        </div>
        <button class="submit-btn" id="calc-btn" onclick="executeApi鑑定()">深層命式を算出する</button>
    </div>

    <div class="content" id="result-view" style="display: none;">
        <div class="result-title" id="user-profile">鑑定結果</div>

        <div class="dragon-manifest-area">
            <div class="dragon-visual" id="dragon-image"></div>
            <p class="dragon-name" id="dragon-title">主星の龍</p>
            <p class="gogyo-affinity" id="affinity-type"></p>
        </div>
        
        <div class="meishiki-grid">
            <div class="meishiki-card" id="card-jishi">
                <div class="card-label">時柱</div>
                <div class="kan" id="m-jishi-ten">ー</div>
                <div class="chi" id="m-jishi-chi">ー</div>
                <div class="star" id="s-jishi">ー</div>
            </div>
            <div class="meishiki-card">
                <div class="card-label">日柱</div>
                <div class="kan" id="m-nichi-ten">ー</div>
                <div class="chi" id="m-nichi-chi">ー</div>
                <div class="star" id="s-nichi">ー</div>
            </div>
            <div class="meishiki-card">
                <div class="card-label">月柱</div>
                <div class="kan" id="m-getsu-ten">ー</div>
                <div class="chi" id="m-getsu-chi">ー</div>
                <div class="star" id="s-getsu">ー</div>
            </div>
            <div class="meishiki-card">
                <div class="card-label">年柱</div>
                <div class="kan" id="m-nen-ten">ー</div>
                <div class="chi" id="m-nen-chi">ー</div>
                <div class="star" id="s-nen">ー</div>
            </div>
        </div>

        <div class="diagnostic-box" id="diagnostic-text"></div>

        <button class="line-btn" onclick="triggerLineTransition()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.304c0-5.231-5.384-9.486-12-9.486s-12 4.255-12 9.486c0 4.69 4.023 8.611 9.463 9.358.368.079.869.243 1.016.558.139.297.091.763.044 1.064l-.193 1.159c-.059.355-.285 1.393 1.229.76 1.403-.588 7.564-4.444 10.302-7.614 2.144-2.439 2.139-4.524 2.139-5.285zm-15.549 2.808h-1.636c-.23 0-.416-.185-.416-.416v-3.791c0-.23.185-.416.416-.416s.416.185.416.416v3.375h1.22c.23 0 .416.186.416.416s-.186.416-.416.416zm2.348-.416c0 .23-.185.416-.416.416h-.832c-.23 0-.416-.185-.416-.416v-3.791c0-.23.185-.416.416-.416s.416.185.416.416v3.375h.416c.23 0 .416.186.416.416zm1.311 0c0 .23-.185.416-.416.416s-.416-.185-.416-.416v-3.791c0-.23.185-.416.416-.416s.416.185.416.416v3.371zm3.434 0c0 .23-.186.416-.416.416h-1.247c-.23 0-.416-.185-.416-.416v-3.791c0-.23.186-.416.416-.416h1.247c.23 0 .416.185.416.416s-.186.416-.416.416h-.831v1.039h.831c.23 0 .416.186.416.416s-.186.416-.416.416h-.831v1.04h.831c.23 0 .416.186.416.416z"/></svg>
            このままLINEで詳細の天命を受け取る
        </button>
        <button class="back-btn" onclick="backToInput()">別の生年月日で再度算出する</button>
    </div>
</div>

<script>
    const GOGYO_AFFINITY_MAP = {
        '甲':'木 (青龍)', '乙':'木 (青龍)',
        '丙':'火 (朱雀)', '丁':'火 (朱雀)',
        '戊':'土 (黄龍)', '己':'土 (黄龍)',
        '庚':'金 (白虎)', '辛':'金 (白虎)',
        '壬':'水 (玄武)', '癸':'水 (玄武)'
    };

    const DRAGON_VISUAL_MAP = {
        '木 (青龍)': 'https://reimagine.rikyu.ai/rendered/5e630857-418f-43b8-89c5-f852b7ac9e67.png',
        '火 (朱雀)': 'https://reimagine.rikyu.ai/rendered/5e630857-418f-43b8-89c5-f852b7ac9e67.png',
        '土 (黄龍)': 'https://reimagine.rikyu.ai/rendered/5e630857-418f-43b8-89c5-f852b7ac9e67.png',
        '金 (白虎)': 'https://reimagine.rikyu.ai/rendered/5e630857-418f-43b8-89c5-f852b7ac9e67.png',
        '水 (玄武)': 'https://reimagine.rikyu.ai/rendered/5e630857-418f-43b8-89c5-f852b7ac9e67.png'
    };

    let selectedGender = 'male';

    function setGender(gender) {
        selectedGender = gender;
        document.getElementById('btn-male').classList.toggle('active', gender === 'male');
        document.getElementById('btn-female').classList.toggle('active', gender === 'female');
    }

    async function executeApi鑑定() {
        const calcBtn = document.getElementById('calc-btn');
        const bdayStr = document.getElementById('birthday').value;
        const bhour = document.getElementById('birthtime').value;

        if(!bdayStr) { alert('生年月日をご入力ください。'); return; }

        calcBtn.classList.add('loading');
        calcBtn.innerText = '五龍呼び出し中...';

        try {
            // APIへのリクエストパラメータ構築
            const params = new URLSearchParams({
                type: 'full',
                date: bdayStr,
                time: bhour,
                standard: 'navi' // 【重要】推命NAVI準拠モードで計算
            });

            // 外部の推命計算APIサーバーへアクセス（※ここは先生専用のAPIキーなどを後ほど設定）
            // 現状はテスト用のダミーAPIエンドポイントにアクセスします。
            const response = await fetch(`https://api.rikyu.ai/gogyo/meishiki?${params}`);
            
            if (!response.ok) throw new Error('API通信エラー');
            
            const meishiki = await response.json();

            // APIの正確な結果をUIに反映
            renderMeishiki(meishiki);
            renderDragonVisual(meishiki.nichiTen);

        } catch (error) {
            console.error('算出エラー:', error);
            alert('天文暦APIとの連携に一時的なエラーが発生しました。時間を置いて再度お試しいただくか、LINEチャットより「APIエラー」とご連絡ください。');
        } finally {
            calcBtn.classList.remove('loading');
            calcBtn.innerText = '深層命式を算出する';
        }
    }

    function renderMeishiki(data) {
        // 時柱
        if (data.hourHourTen) {
            document.getElementById('m-jishi-ten').innerText = data.hourHourTen;
            document.getElementById('m-jishi-chi').innerText = data.hourHourChi;
            document.getElementById('s-jishi').innerText = data.starJishi;
            document.getElementById('card-jishi').style.opacity = "1";
        } else {
            document.getElementById('m-jishi-ten').innerText = "ー";
            document.getElementById('m-jishi-chi').innerText = "ー";
            document.getElementById('s-jishi').innerText = "ー";
            document.getElementById('card-jishi').style.opacity = "0.3";
        }

        // 日柱
        document.getElementById('m-nichi-ten').innerText = data.nichiTen;
        document.getElementById('m-nichi-chi').innerText = data.nichiChi;
        document.getElementById('s-nichi').innerText = `${data.starNichi} (主星)`;

        // 月柱
        document.getElementById('m-getsu-ten').innerText = data.monthMonthTen;
        document.getElementById('m-getsu-chi').innerText = data.monthMonthChi;
        document.getElementById('s-getsu').innerText = data.starGetsu;

        // 年柱
        document.getElementById('m-nen-ten').innerText = data.nenTen;
        document.getElementById('m-nen-chi').innerText = data.nenChi;
        document.getElementById('s-nen').innerText = data.starNen;

        const name = document.getElementById('username').value || 'あなた';
        document.getElementById('user-profile').innerText = `${name} 様 （${selectedGender==='male'?'男命':'女命'}・深層命式鑑定書）`;

        // 【信用構築】推命NAVI基準であることを明記
        document.getElementById('diagnostic-text').innerHTML = `<strong>◆ 【推命NAVI天文暦演算】に基づく鑑定結果</strong><br>主星の日干【${data.nichiTen}】と、あなたの社会的天命を司る月柱の深層【${data.starGetsu}】の配列は、五龍のエネルギーを特殊な形で受信しています。<br><br>これらが織りなす、あなただけの人生の動線と、複雑な悩みを打破する鍵は下記LINEにて限定公開中です。API算出された正確な命式画像をチャットへ送信してください。`;

        document.getElementById('input-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    function renderDragonVisual(nichiTen) {
        const affinity = GOGYO_AFFINITY_MAP[nichiTen];
        const dragonImageUrl = DRAGON_VISUAL_MAP[affinity];

        const dragonImageElem = document.getElementById('dragon-image');
        dragonImageElem.style.backgroundImage = `url(${dragonImageUrl})`;
        dragonImageElem.style.display = 'block'; // 画像を表示

        document.getElementById('dragon-title').innerText = affinity;
        document.getElementById('affinity-type').innerText = `あなたの深層主星【${nichiTen}】に対応する五龍`;
    }

    function backToInput() {
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('input-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    function triggerLineTransition() {
        alert('【公式LINEチャットへの画面遷移】\n\nここをタップすると、自動的に公式LINEのアカウント画面が開きます。\nユーザーが結果画面のスクリーンショットをそのままチャットへ送信することで、プレミアム個別鑑定へとシームレスに繋がります。');
    }
</script>
</body>
</html>
