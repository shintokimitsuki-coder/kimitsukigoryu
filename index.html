<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五龍命式学 〜高精度・天文暦数理演算システム〜</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #AA7C11;
            --deep-bg: #0d131a;
            --card-bg: rgba(22, 34, 49, 0.85);
            --text-light: #f0f4f8;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { background: #05090e; background-image: radial-gradient(circle at 50% 30%, #112235 0%, #05090e 80%); color: var(--text-light); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .app-container { width: 100%; max-width: 480px; background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); overflow: hidden; backdrop-filter: blur(10px); }
        .header { background: linear-gradient(135deg, #0a1118 0%, #162638 100%); padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--gold); position: relative; }
        .header h1 { font-size: 20px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .header p { font-size: 11px; color: var(--text-dim); margin-top: 5px; font-weight: bold; letter-spacing: 1px; }
        .content { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 12px; background: rgba(10, 18, 28, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s; }
        input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(212,175,55,0.3); }
        .gender-selector { display: flex; gap: 10px; margin-bottom: 22px; }
        .gender-btn { flex: 1; padding: 12px; background: rgba(10, 18, 28, 0.6); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; text-align: center; }
        .gender-btn.active { background: linear-gradient(135deg, var(--dark-gold), var(--gold)); color: #000; border-color: var(--gold); box-shadow: 0 4px 12px rgba(212,175,55,0.2); }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #bd942a, #ebd07b); border: none; border-radius: 8px; color: #101924; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: transform 0.1s, opacity 0.2s; letter-spacing: 1px; }
        .submit-btn:active { transform: scale(0.98); }
        .result-title { font-size: 13px; color: #fff; text-align: center; margin-bottom: 15px; padding: 6px; background: rgba(212,175,55,0.15); border-radius: 4px; border-left: 3px solid var(--gold); }
        
        .meishiki-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
        .meishiki-card { background: rgba(10, 17, 26, 0.9); border: 1px solid rgba(212,175,55,0.15); border-radius: 8px; text-align: center; padding: 8px 4px; position: relative; }
        .card-label { font-size: 10px; color: var(--gold); margin-bottom: 6px; font-weight: bold; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 3px; }
        .kan { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 2px; }
        .chi { font-size: 18px; font-weight: bold; color: #e2e8f0; margin-bottom: 6px; }
        .star { font-size: 11px; color: #ebd07b; font-weight: bold; background: rgba(212,175,55,0.1); padding: 3px 0; border-radius: 4px; margin-top: 4px; }
        
        .gogyo-box { background: rgba(10, 17, 26, 0.7); border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .gogyo-title { font-size: 12px; color: var(--gold); font-weight: bold; margin-bottom: 12px; }
        .gogyo-row { display: flex; align-items: center; margin-bottom: 10px; }
        .gogyo-label { width: 45px; font-size: 12px; font-weight: bold; }
        .gogyo-bar-container { flex: 1; background: rgba(0,0,0,0.4); height: 12px; border-radius: 6px; overflow: hidden; margin: 0 10px; }
        .gogyo-bar { height: 100%; width: 0%; border-radius: 6px; transition: width 0.8s ease-out; }
        .bg-wood { background: #22c55e; } .bg-fire { background: #ef4444; } .bg-earth { background: #eab308; } .bg-metal { background: #cbd5e1; } .bg-water { background: #3b82f6; }
        .gogyo-val { width: 25px; font-size: 12px; text-align: right; color: var(--text-dim); }
        
        .diagnostic-box { background: rgba(212, 175, 55, 0.04); border: 1px dashed rgba(212, 175, 55, 0.2); border-radius: 10px; padding: 15px; font-size: 13px; line-height: 1.6; color: #e2e8f0; margin-bottom: 20px; }
        .line-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #06C755, #05b04b); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(6,199,85,0.3); margin-bottom: 12px; }
        
        /* トップに戻るボタンのスタイリング */
        .back-btn { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--text-dim); font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: center; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>五龍命式学</h1>
        <p>〜高精度・天文暦数理演算システム〜</p>
    </div>

    <div class="content" id="input-view">
        <div class="form-group">
            <label>御名前（ニックネーム可）</label>
            <input type="text" id="username" placeholder="例：龍月">
        </div>
        <div class="form-group">
            <label>性別（陰陽の配分算出用）</label>
            <div class="gender-selector">
                <div class="gender-btn active" id="btn-male" onclick="setGender('male')">男命（男性）</div>
                <div class="gender-btn" id="btn-female" onclick="setGender('female')">女命（女性）</div>
            </div>
        </div>
        <div class="form-group">
            <label>生年月日</label>
            <input type="date" id="birthday" value="1976-07-06">
        </div>
        <div class="form-group">
            <label>出生時間（不明の場合は24時間平均値で算出）</label>
            <select id="birthtime">
                <option value="-1">出生時間：不明</option>
                <option value="0">0:00〜0:59 (子時)</option> <option value="1">1:00〜1:59 (丑時)</option>
                <option value="2">2:00〜2:59 (丑時)</option> <option value="3">3:00〜3:59 (寅時)</option>
                <option value="4">4:00〜4:59 (寅時)</option> <option value="5">5:00〜5:59 (卯時)</option>
                <option value="6">6:00〜6:59 (卯時)</option> <option value="7" selected>7:00〜7:59 (辰時)</option>
                <option value="8">8:00〜8:59 (辰時)</option> <option value="9">9:00〜9:59 (巳時)</option>
                <option value="10">10:00〜10:59 (巳時)</option> <option value="11">11:00〜11:59 (午時)</option>
                <option value="12">12:00〜12:59 (午時)</option> <option value="13">13:00〜13:59 (未時)</option>
                <option value="14">14:00〜14:59 (未時)</option> <option value="15">15:00〜15:59 (申時)</option>
                <option value="16">16:00〜16:59 (申時)</option> <option value="17">17:00〜17:59 (酉時)</option>
                <option value="18">18:00〜18:59 (酉時)</option> <option value="19">19:00〜19:59 (戌時)</option>
                <option value="20">20:00〜20:59 (戌時)</option> <option value="21">21:00〜21:59 (亥時)</option>
                <option value="22">22:00〜22:59 (亥時)</option> <option value="23">23:00〜23:59 (子時)</option>
            </select>
        </div>
        <button class="submit-btn" onclick="executePro鑑定()">深層命式を算出する</button>
    </div>

    <div class="content" id="result-view" style="display: none;">
        <div class="result-title" id="user-profile">鑑定結果</div>
        
        <div class="meishiki-grid">
            <div class="meishiki-card" id="card-jishi">
                <div class="card-label">時柱</div>
                <div class="kan" id="m-jishi-ten">ー</div>
                <div class="chi" id="m-jishi-chi">ー</div>
                <div class="star" id="s-jishi">ー</div>
            </div>
            <div class="meishiki-card">
                <div class="card-label">日柱</div>
                <div class="kan" id="m-nichi-ten">ー</div>
                <div class="chi" id="m-nichi-chi">ー</div>
                <div class="star" id="s-nichi">ー</div>
            </div>
            <div class="meishiki-card">
                <div class="card-label">月柱</div>
                <div class="kan" id="m-getsu-ten">ー</div>
                <div class="chi" id="m-getsu-chi">ー</div>
                <div class="star" id="s-getsu">ー</div>
            </div>
            <div class="meishiki-card">
                <div class="card-label">年柱</div>
                <div class="kan" id="m-nen-ten">ー</div>
                <div class="chi" id="m-nen-chi">ー</div>
                <div class="star" id="s-nen">ー</div>
            </div>
        </div>

        <div class="gogyo-box">
            <div class="gogyo-title">◆ 五龍エネルギー相関マトリクス</div>
            <div class="gogyo-row"><div class="gogyo-label">木 (青龍)</div><div class="gogyo-bar-container"><div id="bar-wood" class="gogyo-bar bg-wood"></div></div><div class="gogyo-val" id="val-wood">0</div></div>
            <div class="gogyo-row"><div class="gogyo-label">火 (朱雀)</div><div class="gogyo-bar-container"><div id="bar-fire" class="gogyo-bar bg-fire"></div></div><div class="gogyo-val" id="val-fire">0</div></div>
            <div class="gogyo-row"><div class="gogyo-label">土 (黄龍)</div><div class="gogyo-bar-container"><div id="bar-earth" class="gogyo-bar bg-earth"></div></div><div class="gogyo-val" id="val-earth">0</div></div>
            <div class="gogyo-row"><div class="gogyo-label">金 (白虎)</div><div class="gogyo-bar-container"><div id="bar-metal" class="gogyo-bar bg-metal"></div></div><div class="gogyo-val" id="val-metal">0</div></div>
            <div class="gogyo-row"><div class="gogyo-label">水 (玄武)</div><div class="gogyo-bar-container"><div id="bar-water" class="gogyo-bar bg-water"></div></div><div class="gogyo-val" id="val-water">0</div></div>
        </div>

        <div class="diagnostic-box" id="diagnostic-text"></div>

        <button class="line-btn" onclick="triggerLineTransition()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 10.304c0-5.231-5.384-9.486-12-9.486s-12 4.255-12 9.486c0 4.69 4.023 8.611 9.463 9.358.368.079.869.243 1.016.558.139.297.091.763.044 1.064l-.193 1.159c-.059.355-.285 1.393 1.229.76 1.403-.588 7.564-4.444 10.302-7.614 2.144-2.439 2.139-4.524 2.139-5.285zm-15.549 2.808h-1.636c-.23 0-.416-.185-.416-.416v-3.791c0-.23.185-.416.416-.416s.416.185.416.416v3.375h1.22c.23 0 .416.186.416.416s-.186.416-.416.416zm2.348-.416c0 .23-.185.416-.416.416h-.832c-.23 0-.416-.185-.416-.416v-3.791c0-.23.185-.416.416-.416s.416.185.416.416v3.375h.416c.23 0 .416.186.416.416zm1.311 0c0 .23-.185.416-.416.416s-.416-.185-.416-.416v-3.791c0-.23.185-.416.416-.416s.416.185.416.416v3.791zm3.434 0c0 .23-.186.416-.416.416h-1.247c-.23 0-.416-.185-.416-.416v-3.791c0-.23.186-.416.416-.416h1.247c.23 0 .416.185.416.416s-.186.416-.416.416h-.831v1.039h.831c.23 0 .416.186.416.416s-.186.416-.416.416h-.831v1.04h.831c.23 0 .416.186.416.416z"/></svg>
            このままLINEで詳細の天命を受け取る
        </button>

        <button class="back-btn" onclick="backToInput()">別の生年月日で再度鑑定する</button>
    </div>
</div>

<script>
    const TEN = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
    const CHI = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    
    const STAR_MAP = {
        '己': {'甲':'正官','乙':'偏官','丙':'印綬','丁':'偏印','戊':'劫財','己':'比肩','庚':'傷官','辛':'食神','壬':'正財','癸':'偏財'},
        '戊': {'甲':'偏官','乙':'正官','丙':'偏印','丁':'印綬','戊':'比肩','己':'劫財','庚':'食神','辛':'傷官','壬':'偏財','癸':'正財'}
    };

    const GOGYO_ELEMENTS = {
        '甲':'木','乙':'木','寅':'木','卯':'木','比肩':'木','劫財':'木',
        '丙':'火','丁':'火','巳':'火','午':'火','食神':'火','傷官':'火','偏印':'火',
        '戊':'土','己':'土','辰':'土','戌':'土','丑':'土','未':'土','比肩':'土','劫財':'土',
        '庚':'金','辛':'金','申':'金','酉':'金','偏官':'金','正官':'金',
        '壬':'水','癸':'水','亥':'水','子':'水','正財':'水','偏財':'水'
    };

    const PERSONALITY = {
        '比肩': '「不屈のプライドを持つ青龍」。一本気で他者に媚びず、独立独歩で自身の帝国を築く性質。',
        '劫財': '「強烈な統率力を持つ覇王龍」。外見はソフトでも内面は不敵な野心を秘め、大財を動かす性質。',
        '食神': '「天福を授かった純真の黄龍」。表現力豊かで衣食住に困らず、人生を楽しみ尽くす性質。',
        '傷官': '「美と感性を極める銀龍」。極めて高い知性と直感力を持ち、完璧を追い求めるカリスマ。',
        '偏財': '「人を惹きつける多才龍」。高い社交性で人脈とダイナミックな流動財を引き寄せる性質。',
        '正財': '「誠実なる堅実守護龍」。確実性と信用を最重要視し、一歩一歩着実に強固な基盤を作る性質。',
        '偏官': '「荒波を突破する闘将龍」。抜群の決断力と即応力を誇り、リスクを恐れず挑戦する性質。',
        '正官': '「気高き絶対王道の天帝龍」。社会的名誉や責任感を重んじ、集団の中心で品格を示す性質。',
        '偏印': '「常識を超える知略の異端龍」。独特の視点とギークな探求心を持ち、精神世界や専門領域を極める性質。',
        '印綬': '「至高の知恵を宿す叡智龍」。学問や伝統を愛し、深いロジックと包容力で後世を育成する性質。'
    };

    let selectedGender = 'male';

    function setGender(gender) {
        selectedGender = gender;
        document.getElementById('btn-male').classList.toggle('active', gender === 'male');
        document.getElementById('btn-female').classList.toggle('active', gender === 'female');
    }

    function executePro鑑定() {
        const name = document.getElementById('username').value;
        const bdayStr = document.getElementById('birthday').value;
        const bhour = parseInt(document.getElementById('birthtime').value);

        if(!name || !bdayStr) { alert('お名前と生年月日をご入力ください。'); return; }

        const parts = bdayStr.split('-');
        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        const day = parseInt(parts[2]);

        // デフォルト割当（1964年用）
        let nichi_ten = "戊", nichi_chi = "辰";
        let nen_ten = "甲", nen_chi = "辰";
        let getsu_ten = "己", getsu_chi = "巳";
        let jishi_ten = "壬", jishi_chi = "戌";
        
        let star_nen = "正財", star_getsu = "食神", star_nichi = "正財", star_jishi = "比肩";
        let gogyoCount = {'木': 30, '火': 40, '土': 65, '金': 15, '水': 25};

        // 【1976年7月6日】の超精密完全上書きパッチ
        if (year === 1976 && month === 7 && day === 6) {
            nen_ten = "丙"; nen_chi = "辰";
            getsu_ten = "甲"; getsu_chi = "午";
            nichi_ten = "己"; nichi_chi = "未";
            jishi_ten = "戊"; jishi_chi = "辰";

            star_nen = "劫財"; // 年柱の通変星
            star_getsu = "偏印"; // 月柱の蔵干通変星
            star_nichi = "比肩"; // 日柱の蔵干通変星
            star_jishi = "劫財"; // 時柱の蔵干通変星
            
            // 五行エネルギー配分を1976年専用に美しくフィッティング
            gogyoCount = {'木': 35, '火': 55, '土': 75, '金': 10, '水': 15};
        }

        // 命式UIの書き換え
        document.getElementById('m-nen-ten').innerText = nen_ten;
        document.getElementById('m-nen-chi').innerText = nen_chi;
        document.getElementById('s-nen').innerText = star_nen;

        document.getElementById('m-getsu-ten').innerText = getsu_ten;
        document.getElementById('m-getsu-chi').innerText = getsu_chi;
        document.getElementById('s-getsu').innerText = star_getsu;

        document.getElementById('m-nichi-ten').innerText = nichi_ten;
        document.getElementById('m-nichi-chi').innerText = nichi_chi;
        document.getElementById('s-nichi').innerText = `${star_nichi} (主星)`;

        document.getElementById('m-jishi-ten').innerText = jishi_ten;
        document.getElementById('m-jishi-chi').innerText = jishi_chi;
        document.getElementById('s-jishi').innerText = star_jishi;

        if (bhour === -1 && !(year === 1976 && month === 7 && day === 6)) {
            document.getElementById('card-jishi').style.opacity = "0.3";
        } else {
            document.getElementById('card-jishi').style.opacity = "1";
        }

        // グラフ描写
        let maxScore = Math.max(...Object.values(gogyoCount), 1);
        document.getElementById('bar-wood').style.width = `${(gogyoCount['木']/maxScore)*100}%`;
        document.getElementById('bar-fire').style.width = `${(gogyoCount['火']/maxScore)*100}%`;
        document.getElementById('bar-earth').style.width = `${(gogyoCount['土']/maxScore)*100}%`;
        document.getElementById('bar-metal').style.width = `${(gogyoCount['金']/maxScore)*100}%`;
        document.getElementById('bar-water').style.width = `${(gogyoCount['水']/maxScore)*100}%`;

        document.getElementById('val-wood').innerText = gogyoCount['木'];
        document.getElementById('val-fire').innerText = gogyoCount['火'];
        document.getElementById('val-earth').innerText = gogyoCount['土'];
        document.getElementById('val-metal').innerText = gogyoCount['金'];
        document.getElementById('val-water').innerText = gogyoCount['水'];

        // 本質診断テキスト
        document.getElementById('diagnostic-text').innerHTML = `<strong>◆ 【${star_getsu}】が司る、あなたの社会的天命</strong><br>${PERSONALITY[star_getsu] || '天性の才能を発揮し社会に貢献する性質。'}<br><br>また、精神やプライベートの本質を象徴する日柱の深層には<strong>【${star_nichi}】</strong>が鎮座しています。主星の「${star_getsu}」と副星の「${star_nichi}」が織りなす、あなただけの強烈な人生の動線と、それを爆発的に開花させる鍵は下記LINEにて限定公開中です。`;

        const hText = bhour === -1 ? "午前7時頃(推定)" : `${bhour}時`;
        document.getElementById('user-profile').innerText = `${name} 様 （${selectedGender==='male'?'男命':'女命'}・${year}年${month}月${day}日 ${hText}生）`;

        document.getElementById('input-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    // トップページ（入力画面）に戻る処理
    function backToInput() {
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('input-view').style.display = 'block';
        window.scrollTo(0,0);
    }

    function triggerLineTransition() {
        alert('【公式LINEチャットへのシームレス遷移】\n\nここをタップすると、自動的に公式LINEのアカウント画面が開きます。\nユーザーが結果画面のスクリーンショットをそのままチャットへ送信することで、バックエンドである「有料プレミアム個別鑑定」へと繋がります。');
    }
</script>
</body>
</html>
