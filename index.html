<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五龍命式学 〜十龍降臨システム〜</title>
    <style>
        :root { --gold: #D4AF37; --deep-bg: #05090e; --card-bg: rgba(22, 34, 49, 0.9); --aura-color: radial-gradient(circle at 50% 30%, #112235 0%, #05090e 80%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--deep-bg); background-image: var(--aura-color); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; transition: background 1s ease; }
        .app-container { width: 100%; max-width: 480px; background: var(--card-bg); border: 1px solid var(--gold); border-radius: 16px; padding: 20px; text-align: center; backdrop-filter: blur(10px); }
        h1 { color: var(--gold); margin-bottom: 20px; font-size: 24px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-area { display: none; }
        .dragon-orb { width: 120px; height: 120px; margin: 20px auto; border-radius: 50%; border: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; box-shadow: 0 0 30px rgba(212,175,55,0.3); transition: all 0.5s; }
        .line-btn { width: 100%; padding: 15px; background: #06C755; border: none; border-radius: 8px; color: #fff; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container" id="input-view">
    <h1>五龍命式学 十龍システム</h1>
    <input type="text" id="username" placeholder="お名前">
    <input type="date" id="birthday" value="1976-07-06">
    <button class="submit-btn" onclick="calcTenRyu()">龍質を覚醒させる</button>
</div>

<div class="app-container result-area" id="result-view">
    <h2 id="res-title" style="color: var(--gold);">鑑定結果</h2>
    <div class="dragon-orb" id="dragon-orb">龍</div>
    <p id="res-msg" style="margin: 20px 0; line-height: 1.6;"></p>
    <button class="line-btn" onclick="location.href='https://line.me/R/ti/p/@your_line_id'">LINEで神域の封印を解除する</button>
    <button style="background:none; border:none; color:#888; margin-top:15px;" onclick="location.reload()">再入力</button>
</div>

<script>
    const TEN_MAP = {
        '甲': '直進昇龍', '乙': '螺旋昇龍', '丙': '爆発炎龍', '丁': '灯火持続龍',
        '戊': '大地鎮龍', '己': '変容培養龍', '庚': '切断斬龍', '辛': '精密刃龍',
        '壬': '奔流海龍', '癸': '深淵霧龍'
    };
    const COLOR_MAP = { '甲': '#4ade80', '乙': '#4ade80', '丙': '#f87171', '丁': '#f87171', '戊': '#facc15', '己': '#facc15', '庚': '#f4f4f5', '辛': '#f4f4f5', '壬': '#60a5fa', '癸': '#60a5fa' };

    function calcTenRyu() {
        const date = document.getElementById('birthday').value;
        const [y, m, d] = date.split('-').map(Number);
        
        let base = new Date(1899, 11, 25).getTime();
        let target = new Date(y, m-1, d).getTime();
        let diff = Math.floor((target - base) / (1000*60*60*24)) % 60;
        if(diff < 0) diff += 60;
        const TEN_LIST = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        const nikkan = TEN_LIST[diff % 10];
        const dragonName = TEN_MAP[nikkan];
        const color = COLOR_MAP[nikkan];

        document.getElementById('input-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';

        document.getElementById('dragon-orb').innerText = dragonName;
        document.getElementById('dragon-orb').style.borderColor = color;
        document.getElementById('dragon-orb').style.color = color;
        
        const isMaster = ["1964-05-19","1973-06-29","1976-07-06","2000-09-04","2018-12-16","2024-09-11"].includes(date);

        if (isMaster) {
            document.getElementById('res-msg').innerHTML = `あなたの本質は<b>【${dragonName}】</b>です。<br>この命式は完全一致で解析されました。`;
        } else {
            document.getElementById('res-msg').innerHTML = `あなたの本質は<b>【${dragonName}】</b>です。<br>現在、全柱を解析するための「神域の霧」が発生しています。<br><br><b>【現在アプリ開発中(笑)】</b><br>詳細な通変星はLINEで封印解除してください。`;
        }
    }
</script>
</body>
</html>
